# FAIL-SAFE Configuration for Apple Silicon M1 Max
# Ultra-conservative settings to prevent system crashes
# Use only when experiencing memory pressure issues

seed_everything: 0
trainer:
  accelerator: mps
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 16-mixed # Half precision to reduce memory
  logger: false # Disable logging
  callbacks: null
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: 1 # Process only 1 batch at a time
  overfit_batches: 0.0
  val_check_interval: 1000
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 0 # Skip sanity checks
  log_every_n_steps: null
  enable_checkpointing: false # No checkpointing
  enable_progress_bar: false # No progress bar
  enable_model_summary: false # No model summary
  accumulate_grad_batches: 1
  gradient_clip_val: 0.5
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: false # Disable benchmarking
  inference_mode: true
  use_distributed_sampler: false
  profiler: null
  detect_anomaly: false
  barebones: true # Minimal trainer
  plugins: []
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0

model:
  vf_model:
    class_path: networks.AttnUNetF
    init_args:
      n_updown_levels: 4 # Reduced from 5
      in_channels: 3
      hidden_channels: [64, 128, 256, 512] # Reduced channel sizes
      out_channels: 3
      emb_channels: 64 # Reduced from 128
      rotary_dims: 8 # Reduced from 16
      band_embedding_dim: 8 # Reduced from 16
      n_attn_heads: 4 # Reduced from 8
      attention_levels:
        - 2 # Reduced attention levels
      use_attn_input_norm: true
      num_res_blocks: 1 # Reduced from 2
  inv_transforms:
    - class_path: audio_transforms.transforms.PowerScaleSpectrogram
      init_args:
        power: 4
        channels:
          - 0
        eps: 1.0e-09
    - class_path: audio_transforms.transforms.SpectrogramAddDCTerm
    - class_path: audio_transforms.transforms.SVDFixMagInstPhase
    - class_path: audio_transforms.transforms.MagInstPhaseToComplex
    - class_path: audio_transforms.transforms.InverseComplexSpectrogram
      init_args:
        n_fft: 1024 # Reduced from 2048
        win_length: 1024 # Reduced from 2048
        hop_length: 256 # Reduced from 512
        eps: 1.0e-09
  sampling_rate: 44100
  n_timestep_channels: 64 # Reduced from 128
  use_ot_ode: false
  beta_max: 1.0
  pretrained_checkpoints:
    - /Users/gjb/Projects/diffusion-audio-restoration/pretrained/1/A2SB_twosplit_0.0_0.5_release.ckpt
    - /Users/gjb/Projects/diffusion-audio-restoration/pretrained/1/A2SB_twosplit_0.5_1.0_release.ckpt
  t_cutoffs: [0.5]

data:
  mix_dataset_config: {}
  segment_length: 65280 # Reduced from 130560 (half the size)
  sampling_rate: 44100
  num_workers: 0 # No parallel workers
  batch_size: 1 # Absolute minimum
  persistent_workers: false # No worker persistence
  pin_memory: false # Disable memory pinning
  prefetch_factor: 1 # Minimal prefetching
  drop_last: false

  transforms_aug: []
  transforms_aug_val: []
  eval_transforms_aug: []

  transforms_gt:
    - class_path: audio_transforms.transforms.ComplexSpectrogram
      init_args:
        n_fft: 1024 # Reduced from 2048
        win_length: 1024 # Reduced from 2048
        hop_length: 256 # Reduced from 512
        eps: 1.0e-09
    - class_path: audio_transforms.transforms.ComplexToMagInstPhase
    - class_path: audio_transforms.transforms.SVDFixMagInstPhase
    - class_path: audio_transforms.transforms.SpectrogramSubtractDCTerm
    - class_path: audio_transforms.transforms.PowerScaleSpectrogram
      init_args:
        power: 0.25
        channels:
          - 0
        eps: 1.0e-09

  train_max_samples: null
  val_max_samples: 64 # Reduced from 256
  predict_filelist: []
