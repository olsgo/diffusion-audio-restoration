# lightning.pytorch==2.5.3
seed_everything: 0
trainer:
  accelerator: mps
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  logger: null
  callbacks: null
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 1000.0
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.5
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: false
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: []
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  model_registry: null
model:
  vf_model:
    class_path: networks.AttnUNetF
    init_args:
      n_updown_levels: 5
      in_channels: 3
      hidden_channels:
      - 128
      - 256
      - 512
      - 768
      - 1024
      - 2048
      out_channels: 3
      emb_channels: 128
      rotary_dims: 16
      band_embedding_dim: 16
      attention_levels:
      - 3
      - 4
      n_attn_heads: 8
      num_res_blocks: 2
      use_attn_input_norm: true
  inv_transforms:
  - class_path: audio_transforms.transforms.PowerScaleSpectrogram
    init_args:
      power: 4
      channels:
      - 0
      eps: 1.0e-09
  - class_path: audio_transforms.transforms.SpectrogramAddDCTerm
  - class_path: audio_transforms.transforms.SVDFixMagInstPhase
  - class_path: audio_transforms.transforms.MagInstPhaseToComplex
  - class_path: audio_transforms.transforms.InverseComplexSpectrogram
    init_args:
      n_fft: 2048
      win_length: 2048
      hop_length: 512
      eps: 1.0e-09
  sampling_rate: 44100
  n_timestep_channels: 128
  beta_max: 1.0
  use_ot_ode: false
  fast_inpaint_mode: false
  pretrained_checkpoints:
  - /Users/gjb/Projects/diffusion-audio-restoration/pretrained/1/A2SB_twosplit_0.0_0.5_release.ckpt
  - /Users/gjb/Projects/diffusion-audio-restoration/pretrained/1/A2SB_twosplit_0.5_1.0_release.ckpt
  t_cutoffs:
  - 0.5
  predict_n_steps: 25
  predict_hop_length: 128
  predict_win_length: 256
  predict_batch_size: 16
  output_audio_filename: /Users/gjb/_sound/_novaera/_samples/difussion audio restoration/quality_medium_25steps.wav
data:
  mix_dataset_config: {}
  segment_length: 130560
  sampling_rate: 44100
  num_workers: 4
  batch_size: 1
  transforms_gt:
  - class_path: audio_transforms.transforms.ComplexSpectrogram
    init_args:
      n_fft: 2048
      win_length: 2048
      hop_length: 512
      eps: 1.0e-09
  - class_path: audio_transforms.transforms.ComplexToMagInstPhase
  - class_path: audio_transforms.transforms.SpectrogramDropDCTerm
  - class_path: audio_transforms.transforms.PowerScaleSpectrogram
    init_args:
      power: 0.25
      channels:
      - 0
      eps: 1.0e-09
  transforms_aug:
  - class_path: corruption.corruptions.MultinomialInpaintMaskTransform
    init_args:
      p_upsample_mask: 1.0
      p_extension_mask: 0.0
      p_inpaint_mask: 0.0
      fill_noise_level: 0.5
      sampling_rate: 44100
      upsample_mask_kwargs:
        max_cutoff_freq: 12446
        min_cutoff_freq: 12446
      inpainting_mask_kwargs:
        is_random: false
        max_inpainting_frac: 0.1013
        min_inpainting_frac: 0.1013
  transforms_aug_val: []
  eval_transforms_aug: []
  train_max_samples: null
  val_max_samples: 256
  predict_filelist:
  - filepath: /Users/gjb/Library/Mobile Documents/com~apple~CloudDocs/_sound/_audiohijack/System
      Audio 20250818 0126.mp3
    output_subdir: .
  predict_start_idx: 0
  predict_end_idx: null
checkpoint_callback:
  dirpath: ./debug
  filename: latest-epoch_{epoch}-iter_{global_step:.0f}
  monitor: global_step
  verbose: false
  save_last: null
  save_top_k: -1
  save_on_exception: false
  save_weights_only: false
  mode: max
  auto_insert_metric_name: false
  every_n_train_steps: 1000
  train_time_interval: null
  every_n_epochs: null
  save_on_train_epoch_end: null
  enable_version_counter: true
optimizer: null
lr_scheduler: null
return_predictions: null
ckpt_path: null
